<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#09060d">
<title>ABYSS DOMINION v1.0 RC</title>
<style>
*{box-sizing:border-box}
:root{--bg:#09060d;--panel:#1a1122;--panel2:#25172f;--line:#4a355b;--text:#f7efff;--muted:#baaac8;--gold:#f1c56d;--purple:#9c60d8;--red:#df5d67;--green:#69d27a;--blue:#72c7ff}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at top,#2a1736 0,#09060d 52%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit;color:inherit;background:#30223d;border:1px solid #5b426f;border-radius:12px;padding:10px;font-weight:850}
button:active{transform:scale(.98)}button:disabled{opacity:.35}
.primary{background:linear-gradient(135deg,#6a3aa1,#a05fe0);border-color:#bd8af0}.danger{background:#4a2028;border-color:#8e3b47}.goldBtn{background:#5b461f;border-color:#927334}
.screen{display:none;width:100%;height:100%}.screen.active{display:block}
.page{height:100%;max-width:760px;margin:auto;padding:12px;overflow:auto;padding-bottom:max(20px,env(safe-area-inset-bottom))}
.eyebrow{font-size:11px;letter-spacing:.18em;color:var(--gold);font-weight:900}.muted{color:var(--muted)}.small{font-size:10px;color:var(--muted)}
.panel{background:linear-gradient(180deg,#22162c,#17101f);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 10px 24px rgba(0,0,0,.2)}
.big{width:100%;padding:15px;font-size:18px}.row{display:flex;gap:8px;align-items:center}.spread{display:flex;justify-content:space-between;gap:8px;align-items:center}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}.tabs button{font-size:11px;padding:10px 3px}.tabs button.active{outline:2px solid var(--gold)}
.homeGrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.monsterCard,.itemCard,.shopCard{background:#17101f;border:1px solid #423050;border-radius:14px;padding:10px}.monsterCard.selected{outline:2px solid var(--gold)}
.dot{width:34px;height:34px;border-radius:50%;flex:none}.bar{height:9px;background:#07050a;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:var(--green)}
.game{height:100%;max-width:760px;margin:auto;padding:8px;display:grid;grid-template-rows:auto 1fr auto;gap:7px}
.hud{display:grid;grid-template-columns:54px 70px 1fr;gap:6px;background:#17101f;border:1px solid var(--line);border-radius:14px;padding:7px}
.hud span{display:block;font-size:9px;color:var(--muted)}.hud .wide{display:grid;grid-template-columns:67px 1fr 58px;gap:5px;align-items:center}.hud b{font-size:13px}
.canvasWrap{position:relative;min-height:0;overflow:hidden;border:1px solid var(--line);border-radius:16px;background:#09050d}
canvas{display:block;width:100%;height:100%;touch-action:none}
.toast{position:absolute;left:50%;top:10%;transform:translateX(-50%);background:#160f1df2;border:1px solid #7c5a96;border-radius:14px;padding:10px 15px;font-weight:900;white-space:nowrap;z-index:5}.hidden{display:none!important}
.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.nav button{font-size:10px;padding:10px 3px}
.sheet{position:absolute;left:8px;right:8px;bottom:8px;max-height:56%;overflow:auto;background:#140d1bf4;border:1px solid #604474;border-radius:16px;padding:10px;z-index:6}.sheet h3{margin:3px 0 10px}.close{float:right}
.battle{height:100%;max-width:760px;margin:auto;padding:8px;display:grid;grid-template-rows:auto 1fr auto;gap:8px}
.battleHud{display:grid;grid-template-columns:70px 86px 1fr;gap:7px;background:#17101f;border:1px solid var(--line);border-radius:14px;padding:8px}.battleHud span{display:block;font-size:9px;color:var(--muted)}.order{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage{position:relative;overflow:hidden;background:linear-gradient(#140d1a,#08050c);border:1px solid var(--line);border-radius:18px;padding:12px}.enemyName{font-size:20px;font-weight:900;color:var(--gold)}
.hpRow{display:grid;grid-template-columns:1fr 70px;gap:8px;align-items:center}.enemyBar i{background:var(--red)}
.enemySprite{height:31%;display:grid;place-items:center;font-size:100px;filter:drop-shadow(0 12px 18px rgba(0,0,0,.55))}
.party{height:52%;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:end}.member{background:#17101f;border:1px solid #423050;border-radius:14px;padding:8px}.member.active{outline:2px solid var(--gold)}.member.dead{opacity:.4}
.command{background:#17101f;border:1px solid var(--line);border-radius:16px;padding:9px}.main{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.main button{font-size:11px;padding:10px 2px}.sub{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:7px}
.fx{position:absolute;font-weight:950;animation:up .8s forwards;z-index:8}.dmg{font-size:28px;color:#ffd76a}.crit{font-size:34px;color:#fff2a8}.heal{font-size:28px;color:#8dff9c}.guard{font-size:25px;color:#d8bfff}
@keyframes up{0%{opacity:0;transform:translateY(10px) scale(.7)}20%{opacity:1}100%{opacity:0;transform:translateY(-50px) scale(1.15)}}
.modal{position:fixed;inset:0;background:#050308d9;z-index:20;display:grid;place-items:center;padding:18px}.modalBox{width:min(100%,520px);max-height:80vh;overflow:auto;background:#17101f;border:1px solid #654878;border-radius:18px;padding:16px}
.badge{display:inline-block;font-size:9px;border:1px solid #654878;border-radius:999px;padding:3px 7px;margin:2px}.themeTitle{font-size:12px;color:var(--gold);font-weight:900}
@media(max-width:430px){.homeGrid{grid-template-columns:1fr 1fr}.party{gap:6px}.member{padding:7px}.main button{font-size:10px}}
</style>
</head>
<body>

<section id="home" class="screen active"><div class="page">
<div class="eyebrow">ABYSS DOMINION</div><h1>地下1000階の魔王</h1>
<div class="spread"><div><div id="homeProgress" class="themeTitle"></div><div id="homeResources" class="small"></div></div><button id="continueBtn" class="primary">探索へ</button></div>
<div class="tabs" id="homeTabs"><button data-tab="party" class="active">パーティ</button><button data-tab="monsters">魔物</button><button data-tab="gear">装備</button><button data-tab="summon">召喚</button></div>
<div id="homeContent"></div>
<div class="panel"><h3>階層ワープ</h3><div id="warpList"></div></div>
<div class="row"><button id="exportBtn">セーブ書出し</button><button id="resetBtn" class="danger">初期化</button></div>
</div></section>

<section id="explore" class="screen"><div class="game">
<div class="hud"><div><span>階</span><b id="floor">1</b></div><div><span>G</span><b id="gold">0</b></div><div class="wide"><span>魔王軍HP</span><div class="bar"><i id="armyBar"></i></div><b id="armyText">160/160</b></div></div>
<div class="canvasWrap"><canvas id="map" width="720" height="980"></canvas><div id="toast" class="toast hidden"></div><div id="sheet" class="sheet hidden"><button id="closeSheet" class="close">×</button><div id="sheetBody"></div></div></div>
<div class="nav"><button data-page="status">ステータス</button><button data-page="merge">合成</button><button data-page="gear">装備</button><button data-page="shop">ショップ</button><button id="return" class="danger">帰還</button></div>
</div></section>

<section id="battle" class="screen"><div class="battle">
<div class="battleHud"><div><span>TURN</span><b id="turn">1</b></div><div><span>MODE</span><button id="auto">AUTO</button></div><div><span>行動順</span><div id="order" class="order"></div></div></div>
<div class="stage" id="stage"><div class="spread"><div><div id="enemyName" class="enemyName"></div><div id="enemyStatus" class="small"></div></div><button id="escape">逃げる</button></div><div class="hpRow"><div class="bar enemyBar"><i id="enemyBar"></i></div><b id="enemyText"></b></div><div id="enemySprite" class="enemySprite">●</div><div id="partyBattle" class="party"></div><div id="effects"></div></div>
<div class="command"><div class="spread" style="margin-bottom:7px"><b id="active"></b><span id="hint" class="small"></span></div><div id="main" class="main"><button data-c="attack">たたかう</button><button data-c="guard">ガード</button><button data-c="skills">スキル</button><button data-c="item">アイテム</button><button data-c="capture">捕獲</button></div><div id="sub" class="sub"></div></div>
</div></section>

<section id="result" class="screen"><div class="page"><div class="eyebrow" id="resultEye"></div><h1 id="resultTitle"></h1><div id="resultBody"></div><button id="homeBtn" class="primary big">魔王城へ</button></div></section>
<div id="modal" class="modal hidden"><div class="modalBox"><div id="modalBody"></div><button id="modalClose" class="big">閉じる</button></div></div>

<script>
(()=>{'use strict';
const KEY='abyss_v1rc',T=54,W=21,H=21;
const THEMES=[
{name:'地下洞窟',floor:'#3a2947',wall:'#20152a',accent:'#8a62ac'},
{name:'灼熱火山',floor:'#5a2c25',wall:'#281314',accent:'#ef704c'},
{name:'毒沼',floor:'#3c2947',wall:'#1b1322',accent:'#9bd653'},
{name:'深淵ジャングル',floor:'#234233',wall:'#11231a',accent:'#68d59a'},
{name:'氷結洞窟',floor:'#29465c',wall:'#12222e',accent:'#8ddcff'},
{name:'雷神殿',floor:'#30375e',wall:'#15182d',accent:'#f4df68'}
];
const DEF={floor:1,maxFloor:1,checkpoint:1,gold:0,crystal:0,inRun:false,maxHp:160,hp:160,up:{atk:0,hp:0,skill:0},souls:{},gear:[],inventory:{potion:3,capture:5},partyIds:['slime','goblin','fairy','dragon'],monsters:{
slime:{id:'slime',name:'スライム',lv:1,exp:0,plus:0,equip:{weapon:null,armor:null,accessory:null}},
goblin:{id:'goblin',name:'ゴブリン',lv:1,exp:0,plus:0,equip:{weapon:null,armor:null,accessory:null}},
fairy:{id:'fairy',name:'妖精',lv:1,exp:0,plus:0,equip:{weapon:null,armor:null,accessory:null}},
dragon:{id:'dragon',name:'ドラゴン',lv:1,exp:0,plus:0,equip:{weapon:null,armor:null,accessory:null}}
}};
const BASE={
slime:{color:'#42d66a',hp:46,atk:6,def:1,spd:10,crit:.08,skills:[{name:'粘液体当たり',type:'damage',power:1.3},{name:'かばう',type:'cover'}]},
goblin:{color:'#918353',hp:52,atk:9,def:2,spd:15,crit:.16,skills:[{name:'二連斬り',type:'multi',power:.8,hits:2},{name:'急所突き',type:'damage',power:1.8,critBonus:.18}]},
fairy:{color:'#7fe3f7',hp:34,atk:3,def:0,spd:18,crit:.05,skills:[{name:'単体回復',type:'heal',power:24},{name:'全体回復',type:'healAll',power:14}]},
dragon:{color:'#da5656',hp:130,atk:30,def:6,spd:5,crit:.20,skills:[{name:'火炎ブレス',type:'damage',power:2.2},{name:'竜爪撃',type:'damage',power:1.7,critBonus:.15}]},
mushroom:{color:'#b360c9',hp:58,atk:10,def:2,spd:7,crit:.08,skills:[{name:'毒胞子',type:'damage',power:1.2},{name:'菌糸防御',type:'guard'}]},
wyvern:{color:'#ca5e5e',hp:92,atk:20,def:4,spd:16,crit:.14,skills:[{name:'滑空撃',type:'damage',power:1.5},{name:'火球',type:'damage',power:1.8}]}
};
const E=[{id:'slime',name:'洞窟スライム',base:1,spd:9},{id:'goblin',name:'岩ゴブリン',base:1.18,spd:13},{id:'mushroom',name:'毒キノコ',base:1.28,spd:7},{id:'wyvern',name:'子ワイバーン',base:1.58,spd:16}];
let s=load(),ex=null,bt=null,raf=0,last=0,homeTab='party';
const $=x=>document.getElementById(x),cv=$('map'),cx=cv.getContext('2d'),screens=['home','explore','battle','result'];
function load(){try{const x=JSON.parse(localStorage.getItem(KEY));return merge(structuredClone(DEF),x||{})}catch{return structuredClone(DEF)}}function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k])&&a[k])merge(a[k],b[k]);else a[k]=b[k]}return a}
function save(){localStorage.setItem(KEY,JSON.stringify(s))}function show(id){screens.forEach(x=>$(x).classList.toggle('active',x===id))}
function toast(t){$('toast').textContent=t;$('toast').classList.remove('hidden');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.add('hidden'),1100)}
function modal(html){$('modalBody').innerHTML=html;$('modal').classList.remove('hidden')}
function theme(){return THEMES[Math.floor((s.floor-1)/50)%THEMES.length]}
function reqExp(lv){return Math.round(100*Math.pow(1.12,lv-1))}
function equipmentBonus(m){let atk=0,hp=0,def=0,spd=0,crit=0;for(const slot of ['weapon','armor','accessory']){const id=m.equip[slot],g=s.gear.find(x=>x.uid===id);if(g){atk+=g.atk||0;hp+=g.hp||0;def+=g.def||0;spd+=g.spd||0;crit+=g.crit||0}}return{atk,hp,def,spd,crit}}
function memberData(id){const m=s.monsters[id],b=BASE[id]||BASE.slime,scale=1+(m.lv-1)*.055+m.plus*.018,eq=equipmentBonus(m);return{id,name:m.name,lv:m.lv,exp:m.exp,plus:m.plus,color:b.color,maxHp:Math.round(b.hp*scale+eq.hp),hp:Math.round(b.hp*scale+eq.hp),atk:b.atk*scale+eq.atk+s.up.atk*1.4,def:b.def+eq.def,spd:b.spd+eq.spd,crit:b.crit+eq.crit,skills:b.skills,guard:false,cover:false,alive:true,status:{},damage:0,healing:0}}
function party(){return s.partyIds.map(memberData)}
function dungeon(){const g=Array.from({length:H},()=>Array(W).fill(1));function c(x,y){g[y][x]=0;for(const[dx,dy]of[[2,0],[-2,0],[0,2],[0,-2]].sort(()=>Math.random()-.5)){const nx=x+dx,ny=y+dy;if(nx>0&&ny>0&&nx<W-1&&ny<H-1&&g[ny][nx]){g[y+dy/2][x+dx/2]=0;c(nx,ny)}}}c(1,1);for(let i=0;i<22;i++){const x=1+Math.floor(Math.random()*(W-2)),y=1+Math.floor(Math.random()*(H-2));if(g[y][x]&&((!g[y][x-1]&&!g[y][x+1])||(!g[y-1][x]&&!g[y+1][x])))g[y][x]=0}return g}
function cells(g){const a=[];for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++)if(!g[y][x])a.push({x,y});return a}function dist(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}
function pick(a,f,m=8,exs=[]){const q=a.filter(x=>dist(x,f)>=m&&!exs.some(e=>e.x===x.x&&e.y===x.y));return structuredClone(q[Math.floor(Math.random()*q.length)]||a.at(-1))}
function bfs(g,a,z){const K=p=>p.x+','+p.y,q=[a],seen=new Set([K(a)]),pr=new Map(),ds=[[1,0],[-1,0],[0,1],[0,-1]];while(q.length){const c=q.shift();if(c.x===z.x&&c.y===z.y)break;for(const[dx,dy]of ds){const n={x:c.x+dx,y:c.y+dy},k=K(n);if(n.x<0||n.y<0||n.x>=W||n.y>=H||g[n.y][n.x]||seen.has(k))continue;seen.add(k);pr.set(k,c);q.push(n)}}const p=[];let c=z;while(c&&!(c.x===a.x&&c.y===a.y)){p.push(c);c=pr.get(K(c))}p.push(a);return p.reverse()}
function setup(){const g=dungeon(),a=cells(g),st={x:1,y:1},exit=pick(a,st,14),shop=pick(a,st,8,[exit]),rest=pick(a,st,7,[exit,shop]),chest1=pick(a,st,6,[exit,shop,rest]),chest2=pick(a,st,5,[exit,shop,rest,chest1]);ex={g,a,p:{x:1,y:1,px:1,py:1,path:[],t:0},cam:{x:T,y:T,dragX:0,dragY:0},zoom:1,exit,shop,rest,chests:[{...chest1,open:false},{...chest2,open:false}],enemies:[],pause:false,pointers:{},dragging:false,lastPoint:null,spawnTimer:12};for(let i=0;i<Math.min(9,4+Math.floor(s.floor/100));i++)spawn();show('explore');last=performance.now();if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);hud();save()}
function spawn(){const c=ex.a.filter(x=>dist(x,ex.p)>=7&&dist(x,ex.exit)>=3&&!ex.enemies.some(e=>e.alive&&e.x===x.x&&e.y===x.y));if(!c.length)return;const p=structuredClone(c[Math.floor(Math.random()*c.length)]),idx=Math.min(E.length-1,Math.floor(Math.random()*(1+Math.min(E.length,s.floor/20+1)))),type=E[idx],lv=Math.max(1,s.floor+Math.floor(Math.random()*7)-2);ex.enemies.push({x:p.x,y:p.y,px:p.x,py:p.y,path:[],t:0,type,lv,alive:true,patrol:1+Math.random()*2})}
function hud(){$('floor').textContent=s.floor;$('gold').textContent=s.gold;$('armyText').textContent=Math.ceil(s.hp)+'/'+s.maxHp;$('armyBar').style.width=Math.max(0,s.hp/s.maxHp*100)+'%'}
function mover(o,dt,sp=4){if(!o.path.length)return false;const z=o.path[0];o.t+=dt*sp;o.px=o.x+(z.x-o.x)*Math.min(1,o.t);o.py=o.y+(z.y-o.y)*Math.min(1,o.t);if(o.t>=1){o.x=z.x;o.y=z.y;o.px=o.x;o.py=o.y;o.path.shift();o.t=0;return true}return false}
function update(dt){if(ex.pause)return;if(mover(ex.p,dt,4.8)){for(const c of ex.chests)if(!c.open&&c.x===ex.p.x&&c.y===ex.p.y)openChest(c);for(const e of ex.enemies)if(e.alive&&e.x===ex.p.x&&e.y===ex.p.y)return startBattle(e);if(ex.p.x===ex.shop.x&&ex.p.y===ex.shop.y)facility('shop');if(ex.p.x===ex.rest.x&&ex.p.y===ex.rest.y)facility('rest');if(ex.p.x===ex.exit.x&&ex.p.y===ex.exit.y)nextFloor()}for(const e of ex.enemies){if(!e.alive)continue;e.patrol-=dt;if(dist(e,ex.p)<=3)e.path=bfs(ex.g,e,ex.p).slice(1);else if(e.patrol<=0&&!e.path.length){const n=[[1,0],[-1,0],[0,1],[0,-1]].map(([dx,dy])=>({x:e.x+dx,y:e.y+dy})).filter(p=>ex.g[p.y]&&!ex.g[p.y][p.x]);if(n.length)e.path=[n[Math.floor(Math.random()*n.length)]];e.patrol=1+Math.random()*2}if(mover(e,dt,2.1)&&e.x===ex.p.x&&e.y===ex.p.y)return startBattle(e)}ex.spawnTimer-=dt;if(ex.spawnTimer<=0){spawn();ex.spawnTimer=14+Math.random()*12}ex.cam.x+=(ex.p.px*T-ex.cam.x)*Math.min(1,dt*6);ex.cam.y+=(ex.p.py*T-ex.cam.y)*Math.min(1,dt*6);hud();save()}
function draw(){const th=theme();cx.fillStyle='#09050d';cx.fillRect(0,0,720,980);cx.save();cx.translate(360-ex.cam.x*ex.zoom+ex.cam.dragX,490-ex.cam.y*ex.zoom+ex.cam.dragY);cx.scale(ex.zoom,ex.zoom);for(let y=0;y<H;y++)for(let x=0;x<W;x++){cx.fillStyle=ex.g[y][x]?th.wall:th.floor;cx.fillRect(x*T,y*T,T,T);if(!ex.g[y][x]){cx.strokeStyle='rgba(255,255,255,.045)';cx.strokeRect(x*T,y*T,T,T)}}cx.font='30px sans-serif';cx.fillText('🪜',ex.exit.x*T+12,ex.exit.y*T+38);cx.fillText('🛍',ex.shop.x*T+12,ex.shop.y*T+38);cx.fillText('⛺',ex.rest.x*T+12,ex.rest.y*T+38);for(const c of ex.chests)if(!c.open)cx.fillText('🎁',c.x*T+12,c.y*T+38);for(const e of ex.enemies)if(e.alive){cx.fillStyle=BASE[e.type.id]?.color||'#fff';cx.beginPath();cx.arc(e.px*T+T/2,e.py*T+T/2,15,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.font='10px sans-serif';cx.fillText(e.type.name,e.px*T-8,e.py*T+10);cx.fillText('Lv.'+e.lv,e.px*T+8,e.py*T+22)}cx.fillStyle='#42d66a';cx.beginPath();cx.arc(ex.p.px*T+T/2,ex.p.py*T+T/2,17,0,Math.PI*2);cx.fill();cx.restore();mini(th)}
function mini(th){const ox=555,oy=18,q=7;cx.fillStyle='#0b0710dd';cx.fillRect(ox-8,oy-8,160,160);for(let y=0;y<H;y++)for(let x=0;x<W;x++){cx.fillStyle=ex.g[y][x]?th.wall:th.accent;cx.fillRect(ox+x*q,oy+y*q,q-1,q-1)}cx.fillStyle='#57ff8a';cx.fillRect(ox+ex.p.x*q+1,oy+ex.p.y*q+1,5,5);cx.fillStyle='#ff5252';cx.fillRect(ox+ex.exit.x*q+1,oy+ex.exit.y*q+1,5,5);cx.fillStyle='#ffd65e';cx.fillRect(ox+ex.shop.x*q+1,oy+ex.shop.y*q+1,5,5);cx.fillStyle='#6fd5ff';cx.fillRect(ox+ex.rest.x*q+1,oy+ex.rest.y*q+1,5,5);for(const c of ex.chests){cx.fillStyle=c.open?'#777':'#fff071';cx.fillRect(ox+c.x*q+1,oy+c.y*q+1,5,5)}}
function loop(ts){const dt=Math.min(.05,(ts-last)/1000||0);last=ts;update(dt);draw();raf=requestAnimationFrame(loop)}
function openChest(c){c.open=true;const roll=Math.random();if(roll<.45){const g=45+s.floor*4;s.gold+=g;toast('宝箱：'+g+'G')}else if(roll<.75){s.inventory.capture++;toast('捕獲結晶を獲得')}else{const item=randomGear();s.gear.push(item);toast(item.name+'を獲得')}}
function randomGear(){const names=['鉄の剣','魔布のローブ','疾風の指輪','炎竜の牙','深淵の護符'];const slots=['weapon','armor','accessory'];const slot=slots[Math.floor(Math.random()*slots.length)],rarity=Math.random()<.08?'SR':Math.random()<.28?'R':'N',mul=rarity==='SR'?2.2:rarity==='R'?1.45:1;return{uid:Date.now()+Math.random(),name:names[Math.floor(Math.random()*names.length)],slot,rarity,atk:slot==='weapon'?Math.round((5+s.floor*.3)*mul):0,hp:slot==='armor'?Math.round((10+s.floor*.5)*mul):0,def:slot==='armor'?Math.round((1+s.floor*.04)*mul):0,spd:slot==='accessory'?Math.round(2*mul):0,crit:slot==='accessory'?.01*mul:0}}
function nextFloor(){s.floor++;s.maxFloor=Math.max(s.maxFloor,s.floor);if(s.floor%10===0){s.checkpoint=s.floor;toast('CHECKPOINT '+s.floor+'階')}if(s.floor%50===0)modal('<div class="eyebrow">NEW AREA</div><h2>'+theme().name+'</h2><p>景色と出現魔物が変化した。</p>');setup()}
function facility(type){if(type==='shop')openSheet('<h3>セレクトショップ</h3><div class="shopCard spread"><span>回復薬</span><button onclick="buyPotion()">50G</button></div><div class="shopCard spread"><span>捕獲結晶</span><button onclick="buyCapture()">80G</button></div><div class="shopCard spread"><span>ランダム装備</span><button onclick="buyGear()">160G</button></div>');else openSheet('<h3>休憩所</h3><p>100Gで魔王軍HPとパーティを全回復。</p><button onclick="restNow()">休憩する</button>')}

window.buyPotion=()=>{if(s.gold<50)return alert('G不足');s.gold-=50;s.inventory.potion++;toast('回復薬を購入')};window.buyCapture=()=>{if(s.gold<80)return alert('G不足');s.gold-=80;s.inventory.capture++;toast('捕獲結晶を購入')};window.buyGear=()=>{if(s.gold<160)return alert('G不足');s.gold-=160;const x=randomGear();s.gear.push(x);toast(x.name+'を購入')};window.restNow=()=>{if(s.gold<100)return alert('G不足');s.gold-=100;s.hp=s.maxHp;hud();closeSheet()}
function startBattle(field){cancelAnimationFrame(raf);const hp=Math.round((72+field.lv*7)*field.type.base);bt={field,enemy:{id:field.type.id,name:field.type.name,color:BASE[field.type.id]?.color||'#fff',level:field.lv,maxHp:hp,hp,atk:Math.round((5+field.lv*.5)*field.type.base),def:Math.round(field.lv*.08),spd:field.type.spd,status:{},guard:false},party:party(),turn:1,auto:true,queue:[],idx:0,res:false};show('battle');build();renderBattle();autoAct()}
function build(){bt.queue=[...bt.party.filter(x=>x.alive).map(x=>({side:'a',id:x.id,name:x.name,spd:x.spd})),{side:'e',id:'e',name:bt.enemy.name,spd:bt.enemy.spd}].sort((a,b)=>b.spd-a.spd||Math.random()-.5);bt.idx=0}
function actor(){return bt.queue[bt.idx]}function member(){const a=actor();return a?.side==='a'?bt.party.find(x=>x.id===a.id):null}
function status(x){const a=[];if(x.guard)a.push('ガード');if(x.cover)a.push('かばう');return a.join(' / ')||'正常'}
function renderBattle(){$('turn').textContent=bt.turn;$('auto').textContent=bt.auto?'AUTO':'MANUAL';$('order').textContent=bt.queue.slice(bt.idx).map(x=>x.name).join(' → ');$('enemyName').textContent=bt.enemy.name+' Lv.'+bt.enemy.level;$('enemyStatus').textContent='状態：'+status(bt.enemy);$('enemyBar').style.width=Math.max(0,bt.enemy.hp/bt.enemy.maxHp*100)+'%';$('enemyText').textContent=Math.ceil(Math.max(0,bt.enemy.hp))+'/'+bt.enemy.maxHp;$('enemySprite').style.color=bt.enemy.color;$('partyBattle').innerHTML=bt.party.map(m=>`<div class="member ${actor()?.id===m.id?'active':''} ${!m.alive?'dead':''}"><b>${m.name} Lv.${m.lv}+${m.plus}</b><div class="small">HP ${Math.ceil(m.hp)}/${m.maxHp} SPD ${m.spd}</div><div class="bar"><i style="width:${Math.max(0,m.hp/m.maxHp*100)}%"></i></div><div class="small">${m.alive?status(m):'戦闘不能'}</div></div>`).join('');$('active').textContent=(actor()?.name||'')+'の行動';$('hint').textContent=actor()?.side==='e'?'敵が行動中':bt.auto?'AUTO選択中':'コマンド選択';document.querySelectorAll('#main button').forEach(b=>b.disabled=bt.auto||bt.res||actor()?.side==='e');if(bt.auto||actor()?.side==='e')$('sub').innerHTML=''}
function autoAct(){clearTimeout(autoAct.t);const a=actor();if(!a)return;if(a.side==='e')autoAct.t=setTimeout(enemyAct,420);else if(bt.auto)autoAct.t=setTimeout(()=>command(autoChoice(member())),420)}
function autoChoice(m){if(m.id==='fairy'){const low=[...bt.party].filter(x=>x.alive).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0];if(low&&low.hp/low.maxHp<.48)return{kind:'skill',i:low.hp/low.maxHp<.22?1:0}}if(m.hp/m.maxHp<.18)return{kind:'guard'};return Math.random()<.48?{kind:'skill',i:Math.random()<.5?0:1}:{kind:'attack'}}
function fx(t,x,y,c){const e=document.createElement('div');e.className='fx '+c;e.textContent=t;e.style.left=x+'%';e.style.top=y+'%';$('effects').appendChild(e);setTimeout(()=>e.remove(),850)}
function hit(m,p=1,bonus=0){const base=Math.max(1,Math.round((m.atk*p-bt.enemy.def)*(.88+Math.random()*.24))),crit=Math.random()<m.crit+bonus,dmg=crit?Math.round(base*1.8):base;bt.enemy.hp-=dmg;m.damage+=dmg;fx(crit?'CRIT '+dmg:'-'+dmg,72,28,crit?'crit':'dmg')}
function command(c){if(bt.res)return;const m=member();if(!m)return;bt.res=true;if(c.kind==='attack')hit(m);if(c.kind==='guard'){m.guard=true;fx('GUARD',22,72,'guard')}if(c.kind==='item'){if(s.inventory.potion<=0){bt.res=false;return modal('<h3>回復薬がない</h3>')}s.inventory.potion--;const h=40;m.hp=Math.min(m.maxHp,m.hp+h);fx('+'+h,22,72,'heal')}if(c.kind==='capture'){capture();return}if(c.kind==='skill'){const sk=m.skills[c.i];if(sk.type==='damage')hit(m,sk.power,sk.critBonus||0);if(sk.type==='multi')for(let i=0;i<sk.hits;i++)hit(m,sk.power);if(sk.type==='heal'){const z=[...bt.party].filter(x=>x.alive).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0],h=sk.power;z.hp=Math.min(z.maxHp,z.hp+h);m.healing+=h;fx('+'+h,22,72,'heal')}if(sk.type==='healAll'){for(const z of bt.party.filter(x=>x.alive)){z.hp=Math.min(z.maxHp,z.hp+sk.power);m.healing+=sk.power}fx('全体回復',22,72,'heal')}if(sk.type==='cover'){m.cover=true;fx('かばう',22,72,'guard')}}setTimeout(next,600)}
function capture(){if(s.inventory.capture<=0){bt.res=false;return modal('<h3>捕獲結晶がない</h3>')}s.inventory.capture--;const best=Math.max(...bt.party.map(x=>x.lv)),ratio=bt.enemy.hp/bt.enemy.maxHp,ch=Math.max(.03,Math.min(.84,.48+(best-bt.enemy.level)*.025+(1-ratio)*.48));if(Math.random()<ch){const id=bt.enemy.id;if(s.monsters[id])s.monsters[id].plus++;else{s.monsters[id]={id,name:bt.enemy.name.replace('洞窟','').replace('岩','').replace('子',''),lv:1,exp:0,plus:0,equip:{weapon:null,armor:null,accessory:null}};s.souls[id]=0}fx('捕獲成功',50,45,'heal');setTimeout(victory,600)}else{fx('捕獲失敗',50,45,'dmg');setTimeout(next,600)}}
function enemyAct(){if(bt.res)return;bt.res=true;const alive=bt.party.filter(x=>x.alive);if(!alive.length)return gameOver();const t=alive.find(x=>x.cover)||[...alive].sort((x,y)=>x.hp-y.hp)[0],dmg=Math.max(1,Math.round((bt.enemy.atk-t.def)*(t.guard?.5:1)));t.guard=false;t.hp-=dmg;fx('-'+dmg,22,72,'dmg');if(t.hp<=0){t.hp=0;t.alive=false}setTimeout(next,600)}
function next(){bt.res=false;if(bt.enemy.hp<=0)return victory();if(!bt.party.some(x=>x.alive))return gameOver();bt.idx++;if(bt.idx>=bt.queue.length){bt.turn++;bt.party.forEach(x=>{x.guard=false;x.cover=false});build()}renderBattle();autoAct()}
function grantExp(id,amount){const m=s.monsters[id];if(!m)return;m.exp+=amount;while(m.lv<999&&m.exp>=reqExp(m.lv)){m.exp-=reqExp(m.lv);m.lv++}}
function victory(){bt.field.alive=false;s.gold+=20;const exp=20+bt.enemy.level*5;bt.party.forEach(m=>grantExp(m.id,exp));if(Math.random()<.32){s.souls[bt.enemy.id]=(s.souls[bt.enemy.id]||0)+1;toast(bt.enemy.name+'の魔魂を獲得')}if(Math.random()<.10)s.gear.push(randomGear());bt=null;show('explore');toast('勝利！ EXP '+exp);last=performance.now();raf=requestAnimationFrame(loop);save()}
function escape(){if(bt.res)return;const best=Math.max(...bt.party.filter(x=>x.alive).map(x=>x.spd)),ch=Math.max(.15,Math.min(.9,.55+(best-bt.enemy.spd)*.03));if(Math.random()<ch){bt=null;show('explore');toast('逃走成功');last=performance.now();raf=requestAnimationFrame(loop)}else{fx('逃走失敗',50,45,'dmg');bt.queue=[{side:'e',id:'e',name:bt.enemy.name,spd:999},...bt.queue.slice(bt.idx)];bt.idx=0;renderBattle();autoAct()}}
function gameOver(){const lost=Math.floor(s.gold*.5);s.gold-=lost;s.floor=s.checkpoint;s.inRun=false;bt=null;result('GAME OVER','魔王軍全滅',[`失ったG：${lost}`,`${s.checkpoint}階から再開可能`])}

function renderHome(){const th=THEMES[Math.floor((s.maxFloor-1)/50)%THEMES.length];$('homeProgress').textContent=`最高 ${s.maxFloor}階／${th.name}`;$('homeResources').textContent=`G ${s.gold}　魔晶石 ${s.crystal}　チェックポイント ${s.checkpoint}階`;$('continueBtn').textContent=s.inRun?'探索を再開':'探索へ';document.querySelectorAll('#homeTabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===homeTab));if(homeTab==='party')renderParty();if(homeTab==='monsters')renderMonsters();if(homeTab==='gear')renderGear();if(homeTab==='summon')renderSummon();renderWarp()}

cv.addEventListener('pointerdown',e=>{if(!ex)return;cv.setPointerCapture(e.pointerId);ex.pointers[e.pointerId]={x:e.clientX,y:e.clientY,startX:e.clientX,startY:e.clientY};if(Object.keys(ex.pointers).length===1){ex.dragging=false;ex.lastPoint={x:e.clientX,y:e.clientY}}});

$('continueBtn').onclick=()=>{s.inRun=true;s.floor=Math.max(1,s.floor||s.checkpoint);s.maxHp=160+s.up.hp*20;if(!s.hp||s.hp<=0)s.hp=s.maxHp;setup()};$('return').onclick=()=>{if(confirm('帰還する？')){s.inRun=false;save();result('RETURN','帰還',[`到達階：${s.floor}`])}};$('homeBtn').onclick=()=>{renderHome();show('home')};$('auto').onclick=()=>{bt.auto=!bt.auto;renderBattle();autoAct()};$('escape').onclick=escape;$('closeSheet').onclick=closeSheet;$('modalClose').onclick=()=>$('modal').classList.add('hidden');
$('homeTabs').onclick=e=>{const b=e.target.closest('[data-tab]');if(b){homeTab=b.dataset.tab;renderHome()}};$('warpList').onclick=e=>{const b=e.target.closest('[data-warp]');if(b){s.floor=+b.dataset.warp;s.checkpoint=s.floor;s.inRun=true;setup()}};document.querySelector('.nav').onclick=e=>{const b=e.target.closest('[data-page]');if(b)openPage(b.dataset.page)};
$('main').onclick=e=>{const b=e.target.closest('[data-c]');if(!b||bt.auto||bt.res)return;const c=b.dataset.c;if(c==='attack')command({kind:'attack'});if(c==='guard')command({kind:'guard'});if(c==='item')command({kind:'item'});if(c==='capture')command({kind:'capture'});if(c==='skills')$('sub').innerHTML=member().skills.map((x,i)=>`<button data-s="${i}">${x.name}</button>`).join('')};$('sub').onclick=e=>{const b=e.target.closest('[data-s]');if(b&&!bt.auto&&!bt.res)command({kind:'skill',i:+b.dataset.s})};
$('exportBtn').onclick=()=>{navigator.clipboard?.writeText(JSON.stringify(s));modal('<h3>セーブデータをコピーした</h3><p class="small">クリップボードにJSONを保存。</p>')};$('resetBtn').onclick=()=>{if(confirm('本当に初期化する？')){localStorage.removeItem(KEY);location.reload()}};
renderHome();if(s.inRun)setup();else show('home');
})();
</script>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>ダンジョン経営</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- タイトル画面 -->
  <main id="titleScreen" class="screen title-screen">

    <div class="torch torch-left">🔥</div>
    <div class="torch torch-right">🔥</div>

    <div class="title-card">

      <div class="title-emblem">🏰</div>

      <p class="title-label">DUNGEON MANAGEMENT</p>

      <h1>ダンジョン経営</h1>

      <p class="title-description">
        勇者を迎え撃ち、<br>
        最強のダンジョンを築け。
      </p>

      <button id="startButton" class="main-button">
        <span>ゲーム開始</span>
        <small>NEW GAME</small>
      </button>

      <button id="continueButton" class="sub-button hidden">
        続きから
      </button>

      <div class="title-footer">
        <span>魔王経営シミュレーション</span>
        <span>Ver. 0.1</span>
      </div>

    </div>

  </main>


  <!-- ゲーム画面 -->
  <main id="gameScreen" class="screen game-screen hidden">

    <header class="game-header">

      <div>
        <p class="header-label">DUNGEON</p>
        <h2>名もなき地下迷宮</h2>
      </div>

      <button id="menuButton" class="icon-button">
        ☰
      </button>

    </header>


    <section class="status-bar">

      <div class="status-item">
        <span class="status-icon">💰</span>

        <div>
          <small>所持金</small>
          <strong id="goldDisplay">500 G</strong>
        </div>
      </div>

      <div class="status-item">
        <span class="status-icon">⚔️</span>

        <div>
          <small>WAVE</small>
          <strong id="waveDisplay">1</strong>
        </div>
      </div>

      <div class="status-item">
        <span class="status-icon">👑</span>

        <div>
          <small>魔王ランク</small>
          <strong>F</strong>
        </div>
      </div>

    </section>


    <section class="dungeon-panel">

      <div class="panel-heading">

        <div>
          <p class="section-label">FLOOR 01</p>
          <h3>侵入経路</h3>
        </div>

        <div class="placement-status">
          配置モード
        </div>

      </div>


      <div id="dungeonGrid" class="dungeon-grid"></div>


      <div class="route-guide">

        <span>🚪 入口</span>
        <span>勇者は左上から侵入</span>
        <span>魔王の間 👑</span>

      </div>

    </section>


    <section class="monster-panel">

      <div class="panel-heading">

        <div>
          <p class="section-label">MONSTERS</p>
          <h3>配置する魔物</h3>
        </div>

        <button id="clearButton" class="text-button">
          配置解除
        </button>

      </div>


      <div class="monster-list">

        <button class="monster-card selected" data-monster="slime">

          <span class="monster-icon slime-icon">🟢</span>

          <span class="monster-info">
            <strong>スライム</strong>
            <small>HP 18・ATK 4</small>
          </span>

          <span class="monster-count">
            ×<b id="slimeCount">3</b>
          </span>

        </button>


        <button class="monster-card locked" disabled>

          <span class="monster-icon">👺</span>

          <span class="monster-info">
            <strong>ゴブリン</strong>
            <small>未解放</small>
          </span>

          <span class="monster-count">
            🔒
          </span>

        </button>


        <button class="monster-card locked" disabled>

          <span class="monster-icon">🐺</span>

          <span class="monster-info">
            <strong>魔狼</strong>
            <small>未解放</small>
          </span>

          <span class="monster-count">
            🔒
          </span>

        </button>

      </div>

    </section>


    <section class="battle-panel">

      <div class="battle-message" id="battleMessage">
        スライムをマスに配置しよう。
      </div>

      <button id="battleButton" class="battle-button">
        <span class="battle-button-icon">⚔️</span>

        <span>
          勇者を呼び込む
          <small>WAVE 1 START</small>
        </span>
      </button>

    </section>


    <nav class="bottom-nav">

      <button class="nav-button active">
        <span>🏰</span>
        <small>迷宮</small>
      </button>

      <button class="nav-button">
        <span>👹</span>
        <small>魔物</small>
      </button>

      <button class="nav-button">
        <span>🔬</span>
        <small>研究</small>
      </button>

      <button class="nav-button">
        <span>📖</span>
        <small>図鑑</small>
      </button>

    </nav>

  </main>


  <!-- メニュー -->
  <div id="menuModal" class="modal hidden">

    <div class="modal-card">

      <h3>魔王メニュー</h3>

      <button id="saveButton" class="modal-button">
        💾 セーブ
      </button>

      <button id="returnTitleButton" class="modal-button">
        🏰 タイトルへ戻る
      </button>

      <button id="closeMenuButton" class="modal-close">
        閉じる
      </button>

    </div>

  </div>


  <div id="toast" class="toast hidden"></div>

  <script src="script.js"></script>

</body>
</html>

<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#110b19"><title>Abyss Dominion Runner v0.3</title><link rel="stylesheet" href="style.css"></head><body><div id="app"><header><div><div class="eyebrow">ABYSS DOMINION</div><h1>地下1000階の魔王</h1></div><button id="menuBtn" class="icon">☰</button></header><section class="hud"><div><span>階層</span><b id="floorText">1</b></div><div><span>GOLD</span><b id="goldText">0</b></div><div><span>魔晶石</span><b id="crystalText">0</b></div><div><span>連勝</span><b id="streakText">0</b></div></section><main><section id="homeScreen" class="screen active"><div class="panel hero"><div class="eyebrow">30秒でハマる試作版</div><h2>歩く。戦う。拾う。進む。</h2><p>仲間は自動で前進。プレイヤーは危険な瞬間だけスキルを叩く。</p><button id="startBtn" class="primary big">挑戦開始</button></div><div class="panel"><h3>編成</h3><div id="partyPreview" class="partyPreview"></div></div><div class="panel"><h3>恒久強化</h3><div id="upgradeList" class="upgradeList"></div></div></section><section id="runScreen" class="screen"><div class="panel runPanel"><div class="topline"><div><div id="floorKind" class="eyebrow">通常階</div><h2 id="runTitle">第1階</h2></div><div class="badge" id="runState">進行中</div></div><div class="bossBarWrap hidden" id="bossBarWrap"><span id="bossName">ボス</span><div class="bar boss"><i id="bossBar"></i></div></div><div id="lane" class="lane"><div class="depthShade"></div><div id="partySprite" class="partySprite"><div class="sprite monster">👾</div><div class="sprite monster small">🟢</div><div class="sprite monster small">🧚</div></div><div id="enemySprite" class="enemySprite hidden"><div class="sprite enemy">🧑‍⚔️</div></div><div id="chestSprite" class="chestSprite hidden">🎁</div><div id="impact" class="impact"></div><div class="floorLine one"></div><div class="floorLine two"></div><div class="floorLine three"></div></div><div class="partyStatus"><div><span>魔王軍HP</span><div class="bar"><i id="partyHpBar"></i></div><b id="partyHpText">100 / 100</b></div><div><span>敵HP</span><div class="bar enemybar"><i id="enemyHpBar"></i></div><b id="enemyHpText">—</b></div></div><div id="eventText" class="eventText">地下を進んでいる…</div><div class="skillGrid"><button data-skill="thunder">⚡<b>落雷</b><small id="thunderCd">READY</small></button><button data-skill="heal">💚<b>回復</b><small id="healCd">READY</small></button><button data-skill="barrier">🛡<b>結界</b><small id="barrierCd">READY</small></button><button data-skill="burst">🔥<b>総攻撃</b><small id="burstCd">READY</small></button></div><div class="runButtons"><button id="speedBtn">⏩ ×1</button><button id="pauseBtn">⏸ 一時停止</button><button id="returnBtn" class="danger">帰還</button></div></div><div class="panel logPanel"><h3>戦況</h3><div id="log" class="log"></div></div></section><section id="choiceScreen" class="screen"><div class="panel choicePanel"><div class="eyebrow">FLOOR CLEAR</div><h2>報酬を1つ選ぶ</h2><div id="choices" class="choices"></div></div></section><section id="resultScreen" class="screen"><div class="panel result"><div id="resultEye" class="eyebrow">RETURN</div><h2 id="resultTitle">帰還</h2><div id="resultBody"></div><button id="homeBtn" class="primary">魔王城へ</button></div></section></main><dialog id="modal"><form method="dialog"><button class="close">×</button><div id="modalBody"></div></form></dialog></div><script src="script.js"></script></body></html>

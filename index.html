<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>ABYSS DOMINION v0.1</title><link rel="stylesheet" href="style.css"></head><body>
<div id="app">
<header><div><small>ABYSS DOMINION</small><h1>地下1000階の魔王</h1></div><button id="menu">☰</button></header>
<div class="stats"><div>💰<b id="gold"></b></div><div>💎<b id="crystal"></b></div><div>🏰<b id="floor"></b></div><div>👑<b id="lord"></b></div></div>
<main id="home" class="screen active">
<section><h2>魔王城</h2><p>仮素材だけで中毒性を検証する Ver0.1。</p><div class="grid2"><button id="start" class="primary">⚔ 挑戦開始</button><button id="summon">🌀 召喚</button><button id="party">👾 編成</button><button id="reset" class="danger">初期化</button></div><p class="note">全操作リアルタイム保存。Safariを閉じても続きから再開。</p></section>
<section><h2>所持魔物</h2><div id="inventory"></div></section></main>
<main id="battle" class="screen">
<section><div class="row"><div><small id="kind"></small><h2 id="battleTitle"></h2></div><span id="mode">準備中</span></div>
<div class="barrow"><span>魔王</span><div class="bar"><i id="lordbar"></i></div><b id="lordtxt"></b></div>
<div class="barrow"><span>コスト</span><div class="bar cost"><i id="costbar"></i></div><b id="costtxt"></b></div>
<p class="note">🚪入口　🪨岩　👑魔王　●魔物　🧑勇者</p><div id="board"></div>
<div class="controls"><button id="begin" class="primary">戦闘開始</button><button id="pause">⏸</button><button id="retreat" class="danger">帰還</button></div></section>
<section><h2>控え召喚</h2><div id="hand"></div></section>
<section><h2>魔王スキル</h2><div class="grid2"><button data-skill="thunder">⚡落雷 12</button><button data-skill="haste">🏃加速 10</button><button data-skill="barrier">🛡結界 14</button><button data-skill="surge">🌀召喚促進 16</button></div></section>
<section><h2>戦況</h2><div id="log"></div></section></main>
<main id="reward" class="screen"><section><small>FLOOR CLEAR</small><h2>報酬を1つ選ぶ</h2><div id="choices"></div></section></main>
<main id="result" class="screen"><section class="center"><small id="resEye"></small><h2 id="resTitle"></h2><div id="resBody"></div><button id="homeBtn" class="primary">魔王城へ</button></section></main>
<dialog id="modal"><button id="close">×</button><div id="modalBody"></div></dialog>
</div><script src="script.js"></script></body></html>

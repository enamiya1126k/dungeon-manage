<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#08050d"><title>ABYSS DOMINION</title><link rel="stylesheet" href="styles.css"></head><body>
<div id="app">
<section id="homeScreen" class="screen active"><div class="page"><div class="brand"><div class="eyebrow">ABYSS DOMINION</div><h1>地下1000階の魔王</h1><p>探索し、捕獲し、育て、最深部の神へ挑め。</p></div><div class="homeHero panel"><div><div id="homeArea" class="areaTitle"></div><div id="homeProgress" class="homeProgress"></div><div id="homeResources" class="muted"></div></div><button id="startRunBtn" class="primary big">探索へ</button></div><div id="homeTabs" class="tabs"><button data-tab="party" class="active">パーティ</button><button data-tab="monsters">魔物</button><button data-tab="gear">装備</button><button data-tab="summon">召喚</button></div><div id="homeContent"></div><div class="panel"><div class="spread"><h3>チェックポイント</h3><span class="small">10階ごと</span></div><div id="warpList" class="warpList"></div></div><div class="footerActions"><button id="exportSaveBtn">セーブ書出し</button><button id="resetSaveBtn" class="danger">初期化</button></div></div></section>
<section id="exploreScreen" class="screen"><div class="gameShell"><div class="compactHud"><div><span>階層</span><b id="floorHud">1</b></div><div><span>GOLD</span><b id="goldHud">0</b></div><div><span>魔晶石</span><b id="crystalHud">0</b></div><div class="armyWide"><span>魔王軍HP</span><div class="bar"><i id="armyHpBar"></i></div><b id="armyHpText">160/160</b></div></div><div class="canvasWrap"><canvas id="exploreCanvas" width="720" height="980"></canvas><div id="toast" class="toast hidden"></div><div id="sheet" class="sheet hidden"><button id="sheetClose" class="sheetClose">×</button><div id="sheetBody"></div></div></div><div class="exploreNav"><button data-page="status">ステータス</button><button data-page="merge">合成</button><button data-page="gear">装備</button><button data-page="shop">ショップ</button><button id="returnBtn" class="danger">帰還</button></div></div></section>
<section id="shopRoomScreen" class="screen"><div class="roomPage"><div class="spread roomHeader"><div><div class="eyebrow">SAFE ROOM</div><h2>セレクトショップ</h2></div><button id="leaveShopBtn">ダンジョンへ戻る</button></div><div class="roomScene"><div class="interactCard" data-room="bed"><div class="roomIcon">🛏️</div><b>ベッド</b><span>全回復</span></div><div class="interactCard" data-room="merchant"><div class="roomIcon">🧙‍♂️</div><b>商人</b><span>購入・売却</span></div></div><div id="shopRoomPanel" class="panel"><h3>ここは安全地帯</h3><p class="muted">敵は出現しない。</p></div></div></section>
<section id="battleScreen" class="screen"><div class="battlePage"><div class="battleTopbar"><div><span>TURN</span><b id="turnText">1</b></div><div><span>MODE</span><button id="autoToggleBtn" class="modeBtn">AUTO</button></div><div><span>SPEED</span><button id="speedBtn" class="modeBtn">×1.0</button></div><div class="orderArea"><span>行動順</span><div id="turnOrder" class="turnOrder"></div></div></div><div id="battleStage" class="battleStage"><div class="enemyBlock"><div class="spread"><div><div id="enemyName" class="enemyName"></div><div id="enemyMeta" class="small"></div></div><button id="escapeBtn">逃げる</button></div><div class="hpRow"><div class="bar enemyBar"><i id="enemyHpBar"></i></div><b id="enemyHpText"></b></div><div id="enemyStatusChips" class="statusChips"></div><div id="enemySprite" class="enemySprite">●</div></div><div id="battleMessage" class="battleMessage"></div><div id="effectLayer"></div><div id="partyBattle" class="partyBattle"></div></div><div class="commandPanel"><div class="activeTurnBanner"><div id="activeTurnName">行動待ち</div><div id="activeTurnHint" class="small"></div></div><div id="mainCommands" class="mainCommands"><button data-command="attack">たたかう</button><button data-command="guard">ガード</button><button data-command="skills">スキル</button><button data-command="item">アイテム</button><button data-command="capture">捕獲</button></div><div id="subCommands" class="subCommands"></div></div></div></section>
<section id="resultScreen" class="screen"><div class="page resultPage"><div id="resultEye" class="eyebrow"></div><h1 id="resultTitle"></h1><div id="resultBody"></div><button id="resultHomeBtn" class="primary big">魔王城へ</button></div></section>
<div id="modal" class="modal hidden"><div class="modalBox"><div id="modalBody"></div><button id="modalCloseBtn" class="big">閉じる</button></div></div>
</div><script src="game.js"></script></body></html>

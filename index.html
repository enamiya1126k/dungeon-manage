<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0a0710">
<title>ABYSS DOMINION v0.8</title>
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#09060d;color:#f7efff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button{font:inherit;color:inherit;background:#30223d;border:1px solid #5b426f;border-radius:13px;padding:11px;font-weight:850}button:active{transform:scale(.98)}button:disabled{opacity:.35}
.primary{background:linear-gradient(135deg,#6a3aa1,#a05fe0)}.danger{background:#4a2028}.screen{display:none;width:100%;height:100%}.screen.active{display:block}
.page{max-width:720px;height:100%;margin:auto;padding:20px;overflow:auto}.eyebrow{font-size:11px;letter-spacing:.18em;color:#f1c56d;font-weight:900}
.panel{background:#1b1224;border:1px solid #4a355b;border-radius:18px;padding:14px;margin-top:14px}.big{width:100%;font-size:18px;padding:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.card{display:flex;gap:9px;align-items:center;background:#17101f;border:1px solid #423050;border-radius:13px;padding:10px}
.dot{width:32px;height:32px;border-radius:50%;flex:none}.small{font-size:10px;color:#baaac8}.upgrade{display:flex;justify-content:space-between;align-items:center;margin:8px 0;padding:10px;background:#17101f;border-radius:12px}
.game{height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:7px;max-width:760px;margin:auto;padding:8px}.hud{display:grid;grid-template-columns:65px 80px 1fr;gap:6px;background:#17101f;border:1px solid #4a355b;border-radius:14px;padding:7px}
.hud span{font-size:9px;color:#baaac8;display:block}.wide{display:grid;grid-template-columns:70px 1fr 60px;gap:5px;align-items:center}.bar{height:9px;background:#07050a;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:#67d17b}
.canvasWrap{position:relative;min-height:0;border:1px solid #4a355b;border-radius:16px;overflow:hidden}canvas{display:block;width:100%;height:100%;touch-action:none}
.toast{position:absolute;left:50%;top:12%;transform:translateX(-50%);background:#160f1dcc;border:1px solid #7c5a96;border-radius:14px;padding:10px 15px;font-weight:900}.hidden{display:none!important}
.bottom{display:grid;grid-template-columns:56px 1fr;gap:7px}
.battle{max-width:760px;height:100%;margin:auto;padding:8px;display:grid;grid-template-rows:auto 1fr auto;gap:8px}.battleHud{display:grid;grid-template-columns:75px 90px 1fr;gap:7px;background:#17101f;border:1px solid #4a355b;border-radius:14px;padding:8px}
.battleHud span{font-size:9px;color:#baaac8;display:block}.order{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.stage{position:relative;overflow:hidden;background:linear-gradient(#140d1a,#08050c);border:1px solid #4a355b;border-radius:18px;padding:12px}
.enemyHead{display:flex;justify-content:space-between}.enemyName{font-size:20px;font-weight:900;color:#f1c56d}.status{font-size:10px;color:#baaac8}.hpRow{display:grid;grid-template-columns:1fr 70px;gap:8px;align-items:center;margin-top:8px}.enemyBar i{background:#e15d66}
.enemySprite{height:33%;display:grid;place-items:center;font-size:100px}.party{height:52%;display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:end}.member{background:#17101f;border:1px solid #423050;border-radius:14px;padding:8px}.member.active{outline:2px solid #f1c56d}.memberHp{height:7px;background:#08060b;border-radius:99px;overflow:hidden;margin-top:6px}.memberHp i{display:block;height:100%;background:#68d279}
.command{background:#17101f;border:1px solid #4a355b;border-radius:16px;padding:9px}.activeRow{display:flex;justify-content:space-between;margin-bottom:8px}.main,.sub{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.sub{grid-template-columns:1fr 1fr;margin-top:7px}.main button{font-size:12px;padding:11px 4px}
.fx{position:absolute;font-weight:950;animation:up .8s forwards}.dmg{font-size:28px;color:#ffd76a}.crit{font-size:34px;color:#fff2a8}.heal{font-size:28px;color:#8dff9c}.guard{font-size:25px;color:#d8bfff}@keyframes up{0%{opacity:0;transform:translateY(10px) scale(.7)}20%{opacity:1}100%{opacity:0;transform:translateY(-50px) scale(1.15)}}
.reward{width:100%;text-align:left;min-height:100px;margin:8px 0}.red{background:#4d2229}.blue{background:#1d3558}.purple{background:#39204f}.gold{background:#58441e}
</style>
</head>
<body>
<section id="home" class="screen active"><div class="page"><div class="eyebrow">ABYSS DOMINION</div><h1>地下1000階の魔王</h1><p>専用ターン制戦闘を実装したv0.8。</p><button id="start" class="primary big">挑戦開始</button><div class="panel"><h2>パーティ</h2><div id="partyPreview" class="grid"></div></div><div class="panel"><h2>恒久強化</h2><div id="upgrades"></div></div></div></section>
<section id="explore" class="screen"><div class="game"><div class="hud"><div><span>階</span><b id="floor">1</b></div><div><span>G</span><b id="gold">0</b></div><div class="wide"><span>魔王軍HP</span><div class="bar"><i id="armyBar"></i></div><b id="armyText">160/160</b></div></div><div class="canvasWrap"><canvas id="map" width="720" height="980"></canvas><div id="toast" class="toast hidden"></div></div><div class="bottom"><button id="pause">⏸</button><button id="return" class="danger">帰還</button></div></div></section>
<section id="battle" class="screen"><div class="battle"><div class="battleHud"><div><span>TURN</span><b id="turn">1</b></div><div><span>MODE</span><button id="auto">AUTO</button></div><div><span>行動順</span><div id="order" class="order"></div></div></div><div class="stage" id="stage"><div class="enemyHead"><div><div id="enemyName" class="enemyName"></div><div id="enemyStatus" class="status"></div></div><button id="escape">逃げる</button></div><div class="hpRow"><div class="bar enemyBar"><i id="enemyBar"></i></div><b id="enemyText"></b></div><div id="enemySprite" class="enemySprite">●</div><div id="party" class="party"></div><div id="effects"></div></div><div class="command"><div class="activeRow"><b id="active"></b><span id="hint" class="small"></span></div><div id="main" class="main"><button data-c="attack">たたかう</button><button data-c="guard">ガード</button><button data-c="skills">スキル</button><button data-c="item">アイテム</button></div><div id="sub" class="sub"></div></div></div></section>
<section id="reward" class="screen"><div class="page"><div class="eyebrow">FLOOR CLEAR</div><h1>報酬を1つ選ぶ</h1><div id="summary"></div><div id="choices"></div></div></section>
<section id="result" class="screen"><div class="page"><div id="resultEye" class="eyebrow"></div><h1 id="resultTitle"></h1><div id="resultBody"></div><button id="homeBtn" class="primary big">魔王城へ</button></div></section>
<script>
(()=>{'use strict';
const KEY='abyss_v08',T=54,W=21,H=21;
const DEF={floor:1,maxFloor:1,gold:0,inRun:false,maxHp:160,hp:160,atkBoost:0,skillBoost:0,up:{atk:0,hp:0,skill:0}};
const P={
 slime:{name:'スライム',color:'#42d66a',hp:46,atk:6,def:1,spd:10,crit:.08,skills:[{name:'粘液体当たり',type:'damage',power:1.3,slow:true},{name:'かばう',type:'cover'}]},
 goblin:{name:'ゴブリン',color:'#918353',hp:52,atk:9,def:2,spd:15,crit:.16,skills:[{name:'二連斬り',type:'multi',power:.8,hits:2},{name:'急所突き',type:'damage',power:1.8,critBonus:.25}]},
 fairy:{name:'妖精',color:'#7fe3f7',hp:34,atk:3,def:0,spd:18,crit:.05,skills:[{name:'単体回復',type:'heal',power:24},{name:'全体回復',type:'healAll',power:14}]},
 dragon:{name:'ドラゴン',color:'#da5656',hp:130,atk:30,def:6,spd:5,crit:.2,skills:[{name:'火炎ブレス',type:'damage',power:2.2},{name:'竜爪撃',type:'damage',power:1.7,critBonus:.15}]}
};
const E=[{name:'洞窟スライム',color:'#62ce78',base:1,spd:9},{name:'岩ゴブリン',color:'#a08857',base:1.18,spd:13},{name:'毒キノコ',color:'#b360c9',base:1.28,spd:7},{name:'子ワイバーン',color:'#ca5e5e',base:1.58,spd:16}];
let s=load(),ex=null,bt=null,raf=0,last=0;
const $=x=>document.getElementById(x),cv=$('map'),cx=cv.getContext('2d'),screens=['home','explore','battle','reward','result'];
function load(){try{return Object.assign(structuredClone(DEF),JSON.parse(localStorage.getItem(KEY))||{})}catch{return structuredClone(DEF)}}function save(){localStorage.setItem(KEY,JSON.stringify(s))}
function show(id){screens.forEach(x=>$(x).classList.toggle('active',x===id))}
function toast(t){$('toast').textContent=t;$('toast').classList.remove('hidden');clearTimeout(toast.t);toast.t=setTimeout(()=>$('toast').classList.add('hidden'),900)}
function dungeon(){const g=Array.from({length:H},()=>Array(W).fill(1));function c(x,y){g[y][x]=0;for(const[dX,dY]of[[2,0],[-2,0],[0,2],[0,-2]].sort(()=>Math.random()-.5)){const nx=x+dX,ny=y+dY;if(nx>0&&ny>0&&nx<W-1&&ny<H-1&&g[ny][nx]){g[y+dY/2][x+dX/2]=0;c(nx,ny)}}}c(1,1);return g}
function cells(g){const a=[];for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++)if(!g[y][x])a.push({x,y});return a}function d(a,b){return Math.abs(a.x-b.x)+Math.abs(a.y-b.y)}
function pick(a,f,m=8){const q=a.filter(x=>d(x,f)>=m);return structuredClone(q[Math.floor(Math.random()*q.length)]||a.at(-1))}
function bfs(g,a,z){const K=p=>p.x+','+p.y,q=[a],seen=new Set([K(a)]),pr=new Map(),ds=[[1,0],[-1,0],[0,1],[0,-1]];while(q.length){const c=q.shift();if(c.x===z.x&&c.y===z.y)break;for(const[dx,dy]of ds){const n={x:c.x+dx,y:c.y+dy},k=K(n);if(n.x<0||n.y<0||n.x>=W||n.y>=H||g[n.y][n.x]||seen.has(k))continue;seen.add(k);pr.set(k,c);q.push(n)}}const p=[];let c=z;while(c&&!(c.x===a.x&&c.y===a.y)){p.push(c);c=pr.get(K(c))}p.push(a);return p.reverse()}
function party(){return Object.entries(P).map(([id,x])=>({id,...structuredClone(x),maxHp:x.hp,guard:false,cover:false,alive:true,status:{},damage:0,healing:0,atk:x.atk*(1+s.atkBoost)+s.up.atk*1.5}))}
function enemyObj(type,lv){const hp=Math.round((72+lv*7)*type.base);return{name:type.name,color:type.color,level:lv,maxHp:hp,hp,atk:Math.round((5+lv*.5)*type.base),def:Math.round(lv*.08),spd:type.spd,status:{}}}
function setup(){const g=dungeon(),a=cells(g),st={x:1,y:1},exit=pick(a,st,14);ex={g,a,p:{x:1,y:1,px:1,py:1,path:[],t:0},cam:{x:T,y:T},exit,enemies:[],pause:false};for(let i=0;i<4;i++)spawn();show('explore');last=performance.now();raf=requestAnimationFrame(loop);hud()}
function spawn(){const c=ex.a.filter(x=>d(x,ex.p)>=7&&!ex.enemies.some(e=>e.x===x.x&&e.y===x.y));if(!c.length)return;const p=structuredClone(c[Math.floor(Math.random()*c.length)]),type=E[Math.floor(Math.random()*Math.min(E.length,1+Math.floor(s.floor/15)))],lv=Math.max(1,s.floor+Math.floor(Math.random()*5)-1);ex.enemies.push({x:p.x,y:p.y,px:p.x,py:p.y,path:[],t:0,type,lv,alive:true})}
function hud(){$('floor').textContent=s.floor;$('gold').textContent=s.gold;$('armyText').textContent=Math.ceil(s.hp)+'/'+s.maxHp;$('armyBar').style.width=Math.max(0,s.hp/s.maxHp*100)+'%'}
function move(o,dt,sp=4){if(!o.path.length)return false;const z=o.path[0];o.t+=dt*sp;o.px=o.x+(z.x-o.x)*Math.min(1,o.t);o.py=o.y+(z.y-o.y)*Math.min(1,o.t);if(o.t>=1){o.x=z.x;o.y=z.y;o.px=o.x;o.py=o.y;o.path.shift();o.t=0;return true}return false}
function update(dt){if(ex.pause)return;if(move(ex.p,dt,4.8)){for(const e of ex.enemies)if(e.alive&&e.x===ex.p.x&&e.y===ex.p.y)return startBattle(e);if(ex.p.x===ex.exit.x&&ex.p.y===ex.exit.y)return rewards()}for(const e of ex.enemies){if(!e.alive)continue;if(d(e,ex.p)<=3)e.path=bfs(ex.g,e,ex.p).slice(1);if(move(e,dt,2.2)&&e.x===ex.p.x&&e.y===ex.p.y)return startBattle(e)}ex.cam.x+=(ex.p.px*T-ex.cam.x)*Math.min(1,dt*6);ex.cam.y+=(ex.p.py*T-ex.cam.y)*Math.min(1,dt*6);hud();save()}
function draw(){cx.fillStyle='#09050d';cx.fillRect(0,0,720,980);cx.save();cx.translate(360-ex.cam.x,490-ex.cam.y);for(let y=0;y<H;y++)for(let x=0;x<W;x++){cx.fillStyle=ex.g[y][x]?'#20152a':'#3a2947';cx.fillRect(x*T,y*T,T,T)}cx.font='30px sans-serif';cx.fillText('🪜',ex.exit.x*T+12,ex.exit.y*T+38);for(const e of ex.enemies)if(e.alive){cx.fillStyle=e.type.color;cx.beginPath();cx.arc(e.px*T+T/2,e.py*T+T/2,15,0,Math.PI*2);cx.fill();cx.fillStyle='#fff';cx.font='10px sans-serif';cx.fillText(e.type.name,e.px*T-4,e.py*T+10);cx.fillText('Lv.'+e.lv,e.px*T+8,e.py*T+22)}cx.fillStyle='#42d66a';cx.beginPath();cx.arc(ex.p.px*T+T/2,ex.p.py*T+T/2,17,0,Math.PI*2);cx.fill();cx.restore()}
function loop(ts){const dt=Math.min(.05,(ts-last)/1000||0);last=ts;update(dt);draw();raf=requestAnimationFrame(loop)}
function startBattle(field){cancelAnimationFrame(raf);bt={field,enemy:enemyObj(field.type,field.lv),party:party(),turn:1,auto:true,queue:[],idx:0,res:false,items:3};show('battle');build();renderBattle();auto()}
function build(){bt.queue=[...bt.party.filter(x=>x.alive).map(x=>({side:'a',id:x.id,name:x.name,spd:x.spd-(x.status.slow?4:0)})),{side:'e',id:'e',name:bt.enemy.name,spd:bt.enemy.spd-(bt.enemy.status.slow?4:0)}].sort((a,b)=>b.spd-a.spd||Math.random()-.5);bt.idx=0}
function actor(){return bt.queue[bt.idx]}function member(){const a=actor();return a?.side==='a'?bt.party.find(x=>x.id===a.id):null}
function status(x){const a=[];if(x.guard)a.push('ガード');if(x.cover)a.push('かばう');if(x.status?.slow)a.push('鈍足');return a.join(' / ')||'正常'}
function renderBattle(){$('turn').textContent=bt.turn;$('auto').textContent=bt.auto?'AUTO':'MANUAL';$('order').textContent=bt.queue.slice(bt.idx).map(x=>x.name).join(' → ');$('enemyName').textContent=bt.enemy.name+' Lv.'+bt.enemy.level;$('enemyStatus').textContent='状態：'+status(bt.enemy);$('enemyBar').style.width=Math.max(0,bt.enemy.hp/bt.enemy.maxHp*100)+'%';$('enemyText').textContent=Math.ceil(Math.max(0,bt.enemy.hp))+'/'+bt.enemy.maxHp;$('enemySprite').style.color=bt.enemy.color;$('party').innerHTML=bt.party.map(m=>`<div class="member ${actor()?.id===m.id?'active':''}"><div style="display:flex;gap:8px;align-items:center"><div class="dot" style="background:${m.color}"></div><b>${m.name}</b></div><div class="small">HP ${Math.ceil(m.hp)}/${m.maxHp}　SPD ${m.spd}</div><div class="memberHp"><i style="width:${Math.max(0,m.hp/m.maxHp*100)}%"></i></div><div class="small">${m.alive?status(m):'戦闘不能'}</div></div>`).join('');const a=actor();$('active').textContent=a?(a.name+'の行動'):'ターン終了';$('hint').textContent=a?.side==='e'?'敵が行動中':bt.auto?'AUTO選択中':'コマンド選択';document.querySelectorAll('#main button').forEach(b=>b.disabled=bt.auto||bt.res||a?.side==='e');if(bt.auto||a?.side==='e')$('sub').innerHTML=''}
function auto(){clearTimeout(auto.t);const a=actor();if(!a)return;if(a.side==='e')auto.t=setTimeout(enemyAct,450);else if(bt.auto)auto.t=setTimeout(()=>command(choice(member())),420)}
function choice(m){if(m.id==='fairy'){const low=[...bt.party].filter(x=>x.alive).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0];if(low&&low.hp/low.maxHp<.45)return{kind:'skill',i:low.hp/low.maxHp<.2?1:0}}if(m.hp/m.maxHp<.2)return{kind:'guard'};if(bt.items&&m.hp/m.maxHp<.14)return{kind:'item'};return Math.random()<.5?{kind:'skill',i:Math.random()<.5?0:1}:{kind:'attack'}}
function fx(t,x,y,c){const e=document.createElement('div');e.className='fx '+c;e.textContent=t;e.style.left=x+'%';e.style.top=y+'%';$('effects').appendChild(e);setTimeout(()=>e.remove(),850)}
function hit(m,pow,bonus=0){const base=Math.max(1,Math.round((m.atk*pow-bt.enemy.def)*(.88+Math.random()*.24))),crit=Math.random()<m.crit+bonus,dmg=crit?Math.round(base*1.8):base;bt.enemy.hp-=dmg;m.damage+=dmg;fx(crit?'CRIT '+dmg:'-'+dmg,72,28,crit?'crit':'dmg')}
function command(c){if(bt.res)return;const m=member();if(!m)return;bt.res=true;if(c.kind==='attack')hit(m,1);if(c.kind==='guard'){m.guard=true;fx('GUARD',22,72,'guard')}if(c.kind==='item'&&bt.items){bt.items--;const h=34;m.hp=Math.min(m.maxHp,m.hp+h);fx('+'+h,22,72,'heal')}if(c.kind==='skill'){const sk=m.skills[c.i];if(sk.type==='damage'){hit(m,sk.power,sk.critBonus||0);if(sk.slow)bt.enemy.status.slow=true}if(sk.type==='multi')for(let i=0;i<sk.hits;i++)hit(m,sk.power);if(sk.type==='heal'){const z=[...bt.party].filter(x=>x.alive).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp)[0],h=Math.round(sk.power*(1+s.skillBoost));z.hp=Math.min(z.maxHp,z.hp+h);m.healing+=h;fx('+'+h,22,72,'heal')}if(sk.type==='healAll'){for(const z of bt.party.filter(x=>x.alive)){const h=Math.round(sk.power*(1+s.skillBoost));z.hp=Math.min(z.maxHp,z.hp+h);m.healing+=h}fx('全体回復',22,72,'heal')}if(sk.type==='cover'){m.cover=true;fx('かばう',22,72,'guard')}}setTimeout(next,600)}
function enemyAct(){if(bt.res)return;bt.res=true;const a=bt.party.filter(x=>x.alive);if(!a.length)return gameOver();const t=a.find(x=>x.cover)||[...a].sort((x,y)=>x.hp-y.hp)[0],dmg=Math.max(1,Math.round((bt.enemy.atk-t.def)*(t.guard?.5:1)));t.guard=false;t.hp-=dmg;fx('-'+dmg,22,72,'dmg');if(t.hp<=0){t.hp=0;t.alive=false}setTimeout(next,600)}
function next(){bt.res=false;if(bt.enemy.hp<=0)return victory();if(!bt.party.some(x=>x.alive))return gameOver();bt.idx++;if(bt.idx>=bt.queue.length){bt.turn++;bt.party.forEach(x=>{x.guard=false;x.cover=false});build()}renderBattle();auto()}
function victory(){bt.field.alive=false;s.gold+=20;ex.last=bt.party.map(x=>({name:x.name,damage:Math.round(x.damage),healing:Math.round(x.healing)}));bt=null;show('explore');toast('勝利！');last=performance.now();raf=requestAnimationFrame(loop)}
function escape(){if(bt.res)return;const best=Math.max(...bt.party.filter(x=>x.alive).map(x=>x.spd)),ch=Math.max(.15,Math.min(.9,.55+(best-bt.enemy.spd)*.03));if(Math.random()<ch){fx('逃走成功',50,45,'heal');setTimeout(()=>{bt=null;show('explore');last=performance.now();raf=requestAnimationFrame(loop)},600)}else{fx('逃走失敗',50,45,'dmg');bt.queue=[{side:'e',id:'e',name:bt.enemy.name,spd:999},...bt.queue.slice(bt.idx)];bt.idx=0;renderBattle();auto()}}
function gameOver(){const lost=Math.floor(s.gold*.5);s.gold-=lost;s.inRun=false;bt=null;result('GAME OVER','魔王軍全滅',[`失ったゴールド：${lost}G`,'魔王城へ強制帰還'])}
function rewards(){cancelAnimationFrame(raf);const r=[{c:'red',t:'攻撃微増',d:'ATK +2%',fn:()=>s.atkBoost+=.02},{c:'blue',t:'魔力回復',d:'HP 20%回復',fn:()=>s.hp=Math.min(s.maxHp,s.hp+s.maxHp*.2)},{c:'purple',t:'スキル微増',d:'スキル +3%',fn:()=>s.skillBoost+=.03},{c:'gold',t:'ゴールド',d:(50+s.floor*4)+'G',fn:()=>s.gold+=50+s.floor*4}].sort(()=>Math.random()-.5).slice(0,3);$('summary').innerHTML='<div class="panel">'+(ex.last||[]).map(x=>`<p>${x.name}: ${x.damage}ダメージ / ${x.healing}回復</p>`).join('')+'</div>';$('choices').innerHTML=r.map((x,i)=>`<button class="reward ${x.c}" data-r="${i}"><b>${x.t}</b><br><span>${x.d}</span></button>`).join('');let lock=false;$('choices').onclick=e=>{const b=e.target.closest('[data-r]');if(!b||lock)return;lock=true;r[+b.dataset.r].fn();s.floor++;s.maxFloor=Math.max(s.maxFloor,s.floor);save();confirm('次の階へ進む？')?setup():safeReturn()};show('reward')}
function safeReturn(){cancelAnimationFrame(raf);s.inRun=false;result('SAFE RETURN','帰還成功',[`到達階：${s.floor}`,`GOLD：${s.gold}`])}
function result(e,t,a){$('resultEye').textContent=e;$('resultTitle').textContent=t;$('resultBody').innerHTML='<ul>'+a.map(x=>'<li>'+x+'</li>').join('')+'</ul>';show('result')}
function home(){$('partyPreview').innerHTML=Object.values(P).map(x=>`<div class="card"><div class="dot" style="background:${x.color}"></div><div><b>${x.name}</b><div class="small">HP ${x.hp} / ATK ${x.atk} / SPD ${x.spd}</div></div></div>`).join('');$('upgrades').innerHTML=[['atk','軍団攻撃'],['hp','最大HP'],['skill','スキル威力']].map(([id,n])=>`<div class="upgrade"><span>${n} Lv.${s.up[id]}</span><button data-up="${id}">${100+s.up[id]*120}G</button></div>`).join('')}
cv.addEventListener('pointerdown',e=>{if(!ex)return;const r=cv.getBoundingClientRect(),sx=(e.clientX-r.left)*(720/r.width),sy=(e.clientY-r.top)*(980/r.height),t={x:Math.floor((sx-360+ex.cam.x)/T),y:Math.floor((sy-490+ex.cam.y)/T)};if(ex.g[t.y]&&!ex.g[t.y][t.x])ex.p.path=bfs(ex.g,ex.p,t).slice(1)});
$('start').onclick=()=>{s.inRun=true;s.floor=Math.max(1,s.maxFloor);s.maxHp=160+s.up.hp*20;s.hp=s.maxHp;setup()};$('pause').onclick=()=>ex.pause=!ex.pause;$('return').onclick=()=>{if(confirm('帰還する？'))safeReturn()};$('homeBtn').onclick=()=>{ex=null;home();show('home')};$('auto').onclick=()=>{bt.auto=!bt.auto;renderBattle();auto()};$('escape').onclick=escape;
$('main').onclick=e=>{const b=e.target.closest('[data-c]');if(!b||bt.auto||bt.res)return;const c=b.dataset.c;if(c==='attack')command({kind:'attack'});if(c==='guard')command({kind:'guard'});if(c==='item')command({kind:'item'});if(c==='skills')$('sub').innerHTML=member().skills.map((x,i)=>`<button data-s="${i}">${x.name}</button>`).join('')};$('sub').onclick=e=>{const b=e.target.closest('[data-s]');if(b&&!bt.auto&&!bt.res)command({kind:'skill',i:+b.dataset.s})};$('upgrades').onclick=e=>{const b=e.target.closest('[data-up]');if(!b)return;const id=b.dataset.up,c=100+s.up[id]*120;if(s.gold<c)return alert('G不足');s.gold-=c;s.up[id]++;save();home()};
home();if(s.inRun)setup();else show('home');
})();
</script>
</body></html>

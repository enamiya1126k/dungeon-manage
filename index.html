<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#0a0710"><title>ABYSS DOMINION α v0.7</title><link rel="stylesheet" href="style.css"></head><body><div id="app">
<section id="homeScreen" class="screen active"><div class="homeWrap"><div class="eyebrow">ABYSS DOMINION</div><h1>地下1000階の魔王</h1><p>探索・遭遇・育成をまとめたα版。</p><button id="startBtn" class="primary big">挑戦開始</button><div class="panel"><h3>恒久強化</h3><div id="upgradeList"></div></div></div></section>
<section id="gameScreen" class="screen"><div class="gameShell"><div class="compactHud"><div><span>階</span><b id="floorText">1</b></div><div><span>G</span><b id="goldText">0</b></div><div class="wide"><span>魔王軍HP</span><div class="miniBar"><i id="armyHpBar"></i></div><b id="armyHpText">160/160</b></div><div id="boostText" class="statBoosts">ATK +0%　SKILL +0%</div></div>
<div class="canvasWrap"><canvas id="gameCanvas" width="720" height="980"></canvas><div id="toast" class="toast hidden"></div><div id="battleUi" class="battleUi hidden"><div class="battleTop"><button id="autoBtn" class="modeBtn">AUTO ON</button><div id="turnLabel">行動待ち</div></div><div id="commandRoot"><div class="mainCommands"><button data-main="attack">たたかう</button><button data-main="guard">ガード</button><button data-main="skills">スキル</button><button data-main="item">アイテム</button></div><div id="subCommands" class="subCommands"></div></div></div></div>
<div class="bottomRow"><button id="pauseBtn">⏸</button><button id="centerBtn">🎯</button><button id="returnBtn" class="danger">帰還</button></div></div></section>
<section id="rewardScreen" class="screen"><div class="rewardWrap"><div class="eyebrow">FLOOR CLEAR</div><h2>報酬を1つ選ぶ</h2><div id="battleSummary"></div><div id="rewardChoices"></div></div></section>
<section id="resultScreen" class="screen"><div class="resultWrap"><div id="resultEye" class="eyebrow">RETURN</div><h2 id="resultTitle">帰還</h2><div id="resultBody"></div><button id="homeBtn" class="primary big">魔王城へ</button></div></section>
</div><script src="script.js"></script></body></html>
